      <p>A professional introduction expressing my interest and suitability.</p>

    <!-- PDF VIEWER -->
    <div class="pdf-viewer-wrapper">
      <div class="pdf-toolbar">
        <span class="pdf-label"><i class="fa-regular fa-file-pdf"></i>&nbsp; cover_letter.pdf</span>
        <div class="pdf-controls">
          <button id="prev-page" title="Previous page"><i class="fa-solid fa-chevron-left"></i></button>
          <span id="page-info">Page 1</span>
          <button id="next-page" title="Next page"><i class="fa-solid fa-chevron-right"></i></button>
          <button id="zoom-out" title="Zoom out"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
          <button id="zoom-in" title="Zoom in"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
        </div>
        <a class="pdf-download-btn" href="cover_letter.pdf" download>
          <i class="fa-solid fa-download"></i>&nbsp; Download
        </a>
      </div>
      <div class="pdf-canvas-container">
        <canvas id="pdf-canvas"></canvas>
        <div id="pdf-loading" class="pdf-loading">
          <i class="fa-solid fa-spinner fa-spin"></i>&nbsp; Loading PDF...
        </div>
      </div>
    </div>

    <style>
      .pdf-viewer-wrapper {
        max-width: 900px;
        margin: 2rem auto 3rem;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        border: 1px solid rgba(255,255,255,0.08);
        background: var(--surface, #1a1a2e);
      }
      .pdf-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.65rem 1.25rem;
        background: rgba(255,255,255,0.05);
        border-bottom: 1px solid rgba(255,255,255,0.08);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.82rem;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .pdf-label {
        color: var(--text-muted, #aaa);
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .pdf-controls {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-muted, #aaa);
        font-size: 0.8rem;
      }
      .pdf-controls button {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.12);
        color: var(--text, #eee);
        width: 30px; height: 30px;
        border-radius: 6px;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s;
        font-size: 0.75rem;
      }
      .pdf-controls button:hover { background: rgba(255,255,255,0.16); }
      .pdf-controls button:disabled { opacity: 0.35; cursor: not-allowed; }
      #page-info { min-width: 80px; text-align: center; }
      .pdf-download-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: var(--accent, #7c6af7);
        color: #fff !important;
        padding: 0.35rem 0.9rem;
        border-radius: 6px;
        font-size: 0.8rem;
        text-decoration: none;
        transition: opacity 0.2s;
        font-family: 'JetBrains Mono', monospace;
        white-space: nowrap;
      }
      .pdf-download-btn:hover { opacity: 0.82; }
      .pdf-canvas-container {
        position: relative;
        width: 100%;
        overflow-x: auto;
        display: flex;
        justify-content: center;
        background: #2a2a3e;
        min-height: 500px;
        padding: 1.5rem 0;
      }
      #pdf-canvas {
        display: block;
        box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        border-radius: 4px;
        max-width: 100%;
      }
      .pdf-loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted, #aaa);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.9rem;
        gap: 0.5rem;
        background: #2a2a3e;
      }
      .pdf-loading.hidden { display: none; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      let pdfDoc = null, currentPage = 1, totalPages = 1, scale = 1.4;
      const canvas = document.getElementById('pdf-canvas');
      const ctx = canvas.getContext('2d');
      const loading = document.getElementById('pdf-loading');
      const pageInfo = document.getElementById('page-info');
      const prevBtn = document.getElementById('prev-page');
      const nextBtn = document.getElementById('next-page');

      function renderPage(num) {
        pdfDoc.getPage(num).then(page => {
          const viewport = page.getViewport({ scale });
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          page.render({ canvasContext: ctx, viewport }).promise.then(() => {
            loading.classList.add('hidden');
            pageInfo.textContent = 'Page ' + num + ' of ' + totalPages;
            prevBtn.disabled = num <= 1;
            nextBtn.disabled = num >= totalPages;
          });
        });
      }

      pdfjsLib.getDocument('cover_letter.pdf').promise.then(doc => {
        pdfDoc = doc;
        totalPages = doc.numPages;
        renderPage(currentPage);
      }).catch(() => {
        loading.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>&nbsp; Could not load PDF. Ensure cover_letter.pdf is in the same folder.';
      });

      prevBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderPage(currentPage); } });
      nextBtn.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderPage(currentPage); } });
      document.getElementById('zoom-in').addEventListener('click', () => { scale = Math.min(scale + 0.2, 3.0); renderPage(currentPage); });
      document.getElementById('zoom-out').addEventListener('click', () => { scale = Math.max(scale - 0.2, 0.6); renderPage(currentPage); });
    </script>
  </main>
